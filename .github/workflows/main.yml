name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install Dependencies (Root)
      run: npm ci
      
    - name: Install Dependencies (Backend)
      run: cd backend && npm ci
      
    - name: TypeScript Strict Check
      run: npx tsc --noEmit
      
    - name: ESLint Check
      run: npm run lint
      
    # Example placeholder for unit tests
    # - name: Run Tests
    #   run: npm run test
